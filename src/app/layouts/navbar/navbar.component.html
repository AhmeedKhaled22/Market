<nav class="navbar navbar-expand-lg navbar-dark py-2">
  <div class="container-fluid px-5">

    <!-- Logo -->
    <a class="navbar-brand logo" routerLink="/home" aria-label="Go to home page">
      MARKET
    </a>

    <!-- Toggler -->
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarContent"
      aria-controls="navbarContent"
      aria-expanded="false"
      aria-label="Toggle navigation menu"
      *ngIf="navbarType === 'protected' && isLoggedIn"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Collapse -->
    <div
      class="collapse navbar-collapse"
      id="navbarContent"
      *ngIf="navbarType === 'protected' && isLoggedIn"
    >

      <!-- Links -->
      <ul class="navbar-nav flex-lg-row gap-4 mx-auto">

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/home"
            routerLinkActive="routerActive"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            Home
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/shop"
            routerLinkActive="routerActive"
          >
            Shop
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/about"
            routerLinkActive="routerActive"
          >
            About
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/contact"
            routerLinkActive="routerActive"
          >
            Contact
          </a>
        </li>

      </ul>

      <!-- Icons -->
      <div class="d-flex align-items-center gap-4">

        <!-- Wishlist -->
        <div class="icon-box wish-box">

          <button
            routerLink="/wishlist"
            aria-label="Open wishlist"
            style="background: none; border: none; color: inherit"
          >
            <i class="fa fa-heart"></i>
          </button>

          <span class="badge">{{ wishlistCount }}</span>

          <div class="dropdown-box" *ngIf="showWishlistDropdown">

            <p class="title">Wishlist</p>

            <p *ngIf="wishlistCount === 0"></p>

            <a
              routerLink="/wishlist"
              class="view-btn"
              (click)="showWishlistDropdown = false"
            >
              View Wishlist
            </a>

          </div>

        </div>

        <!-- Cart -->
        <div class="icon-box cart-box">

          <button
            routerLink="/cart"
            aria-label="Open shopping cart"
            style="background: none; border: none; color: inherit"
          >
            <i class="fa fa-shopping-cart cart-icon"></i>
          </button>

          <span class="badge">
            {{ cartCount$ | async }}
          </span>

          <div class="dropdown-box" *ngIf="showCartDropdown">

            <p class="title">Cart</p>

            <p *ngIf="(cartCount$ | async) === 0">Cart is empty</p>

            <a
              routerLink="/cart"
              class="view-btn"
              (click)="showCartDropdown = false"
            >
              View Cart
            </a>

          </div>

        </div>

      </div>

      <!-- Search -->
      <div class="search-container ms-4" role="search">

        <i
          class="fas fa-search search-icon"
          (click)="search(searchText)"
        ></i>

        <input
          type="text"
          class="search-input-modern"
          placeholder="Search gadgets, devices"
          [(ngModel)]="searchText"
          (input)="onSearchChange(searchText)"
          (keyup.enter)="search(searchText)"
        />

        <!-- suggestions -->
        <div class="search-suggestions" *ngIf="showSuggestions">

          <div
            class="suggestion-item"
            *ngFor="let item of suggestions"
            (click)="search(item.title)"
          >
            <img [src]="item.thumbnail" width="35">
            {{item.title}}
          </div>

        </div>

      </div>

      <!-- Logout -->
      <button
        class="logout-btn ms-3"
        (click)="logout()"
        aria-label="Logout from account"
      >
        <i class="fa-solid fa-right-from-bracket"></i>
        Logout
      </button>

    </div>
  </div>
</nav>
