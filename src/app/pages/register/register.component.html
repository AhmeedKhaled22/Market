<div class="login-page">
  <div class="login-card">

    <div class="stars-bg">
      <div class="stars"></div>
      <div class="stars2"></div>
      <div class="stars3"></div>
      <div class="shooting-star"></div>
    </div>

    <div class="login-head">
      <h1>Create account</h1>
      <p>Fill your details to continue</p>
    </div>

    <form
      *ngIf="registerForm"
      class="login-form"
      [formGroup]="registerForm"
      (ngSubmit)="submitRegisterForm()"
      novalidate
      autocomplete="off"
    >

      <!-- Name -->
      <label class="field">
        <span>Your Name</span>
        <input formControlName="name" type="text" placeholder="Enter Your Name" />

        <small class="error"
          *ngIf="registerForm.get('name')?.touched && registerForm.get('name')?.invalid">

          <span *ngIf="registerForm.get('name')?.hasError('required')">Name is required</span>
          <span *ngIf="registerForm.get('name')?.hasError('minlength')">Min 3 characters</span>
          <span *ngIf="registerForm.get('name')?.hasError('maxlength')">Max 20 characters</span>

        </small>
      </label>

      <!-- Email -->
      <label class="field">
        <span>Email</span>
        <input formControlName="email" type="email" placeholder="Enter email" />

        <small class="error"
          *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">

          <span *ngIf="registerForm.get('email')?.hasError('required')">Email is required</span>
          <span *ngIf="registerForm.get('email')?.hasError('email')">Enter valid email</span>

        </small>
      </label>

      <!-- Password -->
      <label class="field">
        <span>Password</span>
        <input formControlName="password" type="password" placeholder="Password" />

        <small class="error"
          *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">

          <span *ngIf="registerForm.get('password')?.hasError('required')">Password required</span>
          <span *ngIf="registerForm.get('password')?.hasError('minlength')">Min 6 characters</span>

        </small>
      </label>

      <!-- Age -->
      <label class="field">
        <span>Age</span>
        <input formControlName="age" type="number" placeholder="Age" />

        <small class="error"
          *ngIf="registerForm.get('age')?.touched && registerForm.get('age')?.invalid">
          Age required
        </small>
      </label>

      <!-- Phone -->
      <label class="field">
        <span>Phone</span>
        <input formControlName="phone" type="tel" placeholder="Phone" />

        <small class="error"
          *ngIf="registerForm.get('phone')?.touched && registerForm.get('phone')?.invalid">
          Phone required
        </small>
      </label>

      <button class="btn" type="submit" [disabled]="isloading || registerForm.invalid">
        {{ isloading ? 'Creating...' : 'Create account' }}
      </button>

      <p class="success" *ngIf="succesMsg">Done</p>
      <p class="error api-error" *ngIf="errorMsg">{{ errorMsg }}</p>

      <p class="footer">
        Already have an account?
        <a routerLink="/login">Log in</a>
      </p>

    </form>

  </div>
</div>
