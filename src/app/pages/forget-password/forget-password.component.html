<div class="login-page">
      <!-- النجوم جوه الفورم -->
    <div class="stars-bg">
      <div class="stars"></div>
      <div class="shooting-star"></div>
      <div class="shooting-star s2"></div>
    </div>

  <div class="login-card">

    <div class="login-head">
      <h1>Forget Password</h1>
      <p>Enter your email to receive a reset link</p>
    </div>

    <form
      class="login-form"
      [formGroup]="forgetForm"
      (ngSubmit)="onSubmit()">

      <div class="field">
        <label>Email</label>

        <input
          type="email"
          formControlName="email"
          placeholder="Enter your email"
        />

        <small class="error"
          *ngIf="forgetForm.get('email')?.touched && forgetForm.get('email')?.invalid">

          <span *ngIf="forgetForm.get('email')?.errors?.['required']">
            Email is required
          </span>

          <span *ngIf="forgetForm.get('email')?.errors?.['email']">
            Enter a valid email
          </span>
        </small>

        <!-- رسالة نجاح -->
        <small class="success" *ngIf="isSuccess">
          ✓ Reset link has been sent successfully
        </small>

        <!-- رسالة خطأ -->
        <small class="error" *ngIf="errorMessage">
          {{ errorMessage }}
        </small>

      </div>

      <button
        type="submit"
        class="btn"
        [disabled]="isSubmitting">

        {{ isSubmitting ? 'Sending...' : 'Send Reset Link' }}

      </button>

      <!-- back to login -->
      <p class="back-login">
        Remember your password?
        <a routerLink="/login" class="link">Back to Login</a>
      </p>

    </form>

  </div>
</div>
